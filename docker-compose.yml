services:
  postgres:
    image: postgres:15
    container_name: comic-realm-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Gr0up3!!!
      POSTGRES_DB: comic_realm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - comic-network

  backend:
    build:
      context: ./BE/ComicRealmBE
      dockerfile: Dockerfile
    container_name: comic-realm-api
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Database__Host: postgres
      Database__Port: "5432"
      Database__UserId: admin
      Database__Password: Gr0up3!!!
      Database__Name: comic_realm
      Jwt__Key: ComicRealm_Docker_Dev_Key_Change_In_Production_2026
      Jwt__Issuer: ComicRealmBE
      Jwt__Audience: ComicRealmFE
      Jwt__ExpiryMinutes: "60"
    depends_on:
      - postgres
    networks:
      - comic-network

  frontend:
    build:
      context: ./FE/ComicRealm
      dockerfile: Dockerfile
    container_name: comic-realm-web
    ports:
      - "5173:5173"
    command: sh -c "pnpm install && pnpm dev -- --host 0.0.0.0"
    environment:
      CI: "true"
    depends_on:
      - backend
    networks:
      - comic-network
    volumes:
      - ./FE/ComicRealm:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  frontend_node_modules:

networks:
  comic-network:
    driver: bridge
