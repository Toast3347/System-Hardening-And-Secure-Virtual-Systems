services:
  postgres:
    image: postgres:15
    container_name: comic-realm-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Gr0up3!!!
      POSTGRES_DB: comic_realm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - comic-network

  backend:
    build:
      context: ./BE/ComicRealmBE
      dockerfile: Dockerfile
    container_name: comic-realm-api
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Database__Host: postgres
      Database__Port: "5432"
      Database__UserId: admin
      Database__Password: Gr0up3!!!
      Database__Name: comic_realm
    depends_on:
      - postgres
    networks:
      - comic-network

  frontend:
    build:
      context: ./FE/ComicRealm
      dockerfile: Dockerfile
    container_name: comic-realm-web
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - comic-network

volumes:
  postgres_data:

networks:
  comic-network:
    driver: bridge
